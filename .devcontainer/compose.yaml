services:
  playout:
    build:
      dockerfile: Dockerfile
      context: .
    ports:
      - 3000:3000
    depends_on:
      - mediamtx
    volumes:
      - ..:/workspace
    command: sleep infinity
  mediamtx:
    image: bluenviron/mediamtx:1
    ports:
      - 8554:8554
      - 1935:1935
      - 8888:8888
      - 8889:8889
      - 8890:8890/udp
      - 8189:8189/udp
